<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>InvovationLoop</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
<main class="shell">
    <header class="topbar">
        <div>
            <p class="eyebrow">Managed by Innovator</p>
            <h1>Agent Recovery Console</h1>
        </div>
        <a class="agent-link" href="http://localhost:8080">Innovator Agent</a>
    </header>

    <section class="status-band" aria-label="Active product feature">
        <div>
            <span class="label">Active Feature</span>
            <strong id="featureName">Loading...</strong>
        </div>
        <div>
            <span class="label">Stage</span>
            <strong id="featureStage">--</strong>
        </div>
        <div>
            <span class="label">Iteration</span>
            <strong id="featureIteration">--</strong>
        </div>
        <div>
            <span class="label">Stability</span>
            <strong id="featureStability">--</strong>
        </div>
    </section>

    <section class="feature-explain" aria-label="Feature details">
        <article>
            <span class="label">What It Does</span>
            <p id="featurePurpose">Loading...</p>
        </article>
        <article>
            <span class="label">How To Use It</span>
            <p id="featureUsage">Loading...</p>
        </article>
        <article>
            <span class="label">Latest Iteration</span>
            <p id="lastImprovement">Loading...</p>
        </article>
    </section>

    <section class="workspace">
        <form id="recoveryForm" class="input-panel">
            <div class="section-title">
                <h2>Failure Input</h2>
                <button type="submit">Build Recovery Plan</button>
            </div>
            <label>
                Agent Goal
                <input id="agentGoal" name="agentGoal" value="improve InvovationLoop and push passing code">
            </label>
            <label>
                Failure Signal
                <textarea id="failureSignal" name="failureSignal">OCI compartment id is not configured and the agent paused before making changes</textarea>
            </label>
            <label>
                Workspace State
                <textarea id="workspaceState" name="workspaceState">services are stopped, git working tree should be inspected, no new commit should be made until tests pass</textarea>
            </label>
            <label>
                Constraints
                <textarea id="constraints" name="constraints">preserve user changes, avoid destructive commands, resume only after admin confirmation</textarea>
            </label>
            <div class="iteration-note">
                <span>Current Focus</span>
                <p id="nextFocus">Loading...</p>
            </div>
        </form>

        <section class="output-panel" aria-label="Generated recovery plan">
            <div class="section-title">
                <h2>Recovery Plan</h2>
                <span id="planStatus" class="muted">ready</span>
            </div>
            <article id="planOutput" class="plan-output"></article>
        </section>
    </section>
</main>
<script src="/app.js"></script>
</body>
</html>
