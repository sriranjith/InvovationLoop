<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>InvovationLoop</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
<main class="shell">
    <header class="topbar">
        <div>
            <p class="eyebrow">Managed by Innovator</p>
            <h1>Opportunity Brief Studio</h1>
        </div>
        <a class="agent-link" href="http://localhost:8080">Innovator Agent</a>
    </header>

    <section class="status-band" aria-label="Active product feature">
        <div>
            <span class="label">Active Feature</span>
            <strong id="featureName">Loading...</strong>
        </div>
        <div>
            <span class="label">Stage</span>
            <strong id="featureStage">--</strong>
        </div>
        <div>
            <span class="label">Iteration</span>
            <strong id="featureIteration">--</strong>
        </div>
        <div>
            <span class="label">Stability</span>
            <strong id="featureStability">--</strong>
        </div>
    </section>

    <section class="feature-explain" aria-label="Feature details">
        <article>
            <span class="label">What It Does</span>
            <p id="featurePurpose">Loading...</p>
        </article>
        <article>
            <span class="label">How To Use It</span>
            <p id="featureUsage">Loading...</p>
        </article>
        <article>
            <span class="label">Latest Iteration</span>
            <p id="lastImprovement">Loading...</p>
        </article>
    </section>

    <section class="workspace">
        <form id="briefForm" class="input-panel">
            <div class="section-title">
                <h2>Problem Input</h2>
                <button type="submit">Generate Brief</button>
            </div>
            <label>
                Industry
                <input id="industry" name="industry" value="healthcare operations">
            </label>
            <label>
                Audience
                <input id="audience" name="audience" value="clinic managers">
            </label>
            <label>
                Problem
                <textarea id="problem" name="problem">staff spend hours reconciling appointment no-shows</textarea>
            </label>
            <label>
                Constraints
                <textarea id="constraints" name="constraints">small teams, limited budget, no new cloud dependency yet</textarea>
            </label>
            <div class="iteration-note">
                <span>Current Focus</span>
                <p id="nextFocus">Loading...</p>
            </div>
        </form>

        <section class="output-panel" aria-label="Generated opportunity brief">
            <div class="section-title">
                <h2>Opportunity Brief</h2>
                <span id="briefStatus" class="muted">ready</span>
            </div>
            <article id="briefOutput" class="brief-output"></article>
        </section>
    </section>
</main>
<script src="/app.js"></script>
</body>
</html>
